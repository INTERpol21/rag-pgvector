services:
  api:
    build: .
    ports:
      - "8081:8081"
    environment:
      STORE_BACKEND: pgvector
      DATABASE_URL: postgresql://rag:rag@db:5432/rag
      EMBEDDINGS_BACKEND: hash
      LLM_BACKEND: mock
      # To synthesize with a real model through the sibling llm-gateway:
      #   LLM_BACKEND: openai
      #   LLM_BASE_URL: http://host.docker.internal:8080/v1
      #   LLM_API_KEY: demo-key
      #   LLM_MODEL: gpt-4o-mini
    depends_on:
      db:
        condition: service_healthy

  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: rag
      POSTGRES_PASSWORD: rag
      POSTGRES_DB: rag
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rag -d rag"]
      interval: 3s
      timeout: 3s
      retries: 15

volumes:
  pgdata:
