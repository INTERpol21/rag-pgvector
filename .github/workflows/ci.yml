name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip
      - run: pip install -r requirements.txt -r requirements-dev.txt
      - run: ruff check app tests evals
      - run: python -m pytest -q
      - run: python evals/run_evals.py --min-hit-rate 0.8
