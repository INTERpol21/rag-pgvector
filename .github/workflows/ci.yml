name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
        with:
          version: "0.8.17"
      - run: uv sync --frozen
      - run: uv run ruff check app tests evals
      - run: uv run mypy app
      - run: uv run pytest -q
      - run: uv run python evals/run_evals.py --min-hit-rate 0.8

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
        with:
          version: "0.8.17"
      - run: uv sync --frozen
      - name: pip-audit (dependency CVEs)
        run: uv run --with pip-audit pip-audit -r requirements.txt
      - name: bandit (SAST)
        run: uv run --with bandit bandit -q -r app
