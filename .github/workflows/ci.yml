name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    # A real pgvector Postgres for the integration tests: without DATABASE_URL
    # they skip, which left the store — the layer with the most SQL in it — as
    # the only part of the service CI never exercised.
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: rag
          POSTGRES_PASSWORD: rag
          POSTGRES_DB: rag
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U rag"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    steps:
      - uses: actions/checkout@v7
      - uses: astral-sh/setup-uv@v7
        with:
          version: "0.11.7"
          # Test on the interpreter the Docker image ships (python:3.14-slim) —
          # without this, the suite runs on whatever the runner has.
          python-version: "3.14"
      - run: uv sync --frozen
      # requirements.txt is exported from uv.lock and is what the Docker image
      # installs from — the lockfile itself is never read at image build time.
      # When the two drift, tests stay green while the container fails to start
      # on a missing dependency. Re-export and fail on any diff.
      - name: requirements.txt in sync with uv.lock
        run: |
          uv export --frozen --no-hashes --no-dev --no-emit-project -o requirements.txt
          uv export --frozen --no-hashes --only-dev --no-emit-project -o requirements-dev.txt
          git diff --exit-code requirements.txt requirements-dev.txt
      - run: uv run ruff check app tests evals
      - run: uv run mypy app
      # -rs so a silent skip regression (e.g. the env var lost in a refactor)
      # is visible in the log; the grep makes it fatal.
      - name: pytest (offline + pgvector integration)
        env:
          DATABASE_URL: postgresql://rag:rag@localhost:5432/rag
        run: |
          set -o pipefail
          uv run pytest -q -rs | tee /tmp/pytest.out
          ! grep -qE "SKIPPED.*(DATABASE_URL|pgvector)" /tmp/pytest.out
      - run: uv run python evals/run_evals.py --min-hit-rate 0.8

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: astral-sh/setup-uv@v7
        with:
          version: "0.11.7"
          # Test on the interpreter the Docker image ships (python:3.14-slim) —
          # without this, the suite runs on whatever the runner has.
          python-version: "3.14"
      - run: uv sync --frozen
      - name: pip-audit (dependency CVEs)
        run: uv run --with pip-audit pip-audit -r requirements.txt
      - name: bandit (SAST)
        run: uv run --with bandit bandit -q -r app

  # OWASP-LLM red-team on the RAG synthesis boundary (LLM01 prompt injection,
  # LLM07 system-prompt leakage). Starts the service offline (memory store + mock
  # LLM), seeds a corpus, and runs promptfoo; a failed assertion fails the job.
  llm-eval:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: astral-sh/setup-uv@v7
        with:
          version: "0.11.7"
          # Test on the interpreter the Docker image ships (python:3.14-slim) —
          # without this, the suite runs on whatever the runner has.
          python-version: "3.14"
      - uses: actions/setup-node@v7
        with:
          node-version: 22
      # npx re-downloads promptfoo on every run without this; the version is
      # pinned in run.sh, so the cache key only rotates on a deliberate bump.
      - uses: actions/cache@v4
        with:
          path: ~/.npm
          key: npm-promptfoo-${{ runner.os }}-${{ hashFiles('evals/promptfoo/run.sh') }}
      - run: uv sync --frozen
      - name: promptfoo eval
        run: bash evals/promptfoo/run.sh
